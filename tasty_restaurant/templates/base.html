<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مطعم تيستي زفتى - أصالة الطعم وقوة التكنولوجيا</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* تحسينات لضمان عمل الموقع على الموبايل */
        body { overflow-x: hidden; }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; }
        .tasty-logo-icon { background: var(--dahan-orange, #ff9f43); color: #fff; padding: 5px 12px; border-radius: 8px; margin-left: 5px; }
        .btn-cart-floating { background: var(--dahan-orange, #ff9f43); color: white; border-radius: 50px; padding: 8px 20px; transition: 0.3s; }
        .btn-cart-floating:hover { background: #e67e22; color: white; }
        .footer-social-link { color: white; text-decoration: none; margin: 0 10px; }
        .footer-social-link:hover { color: var(--dahan-orange, #ff9f43); }
        @media (max-width: 768px) {
            .navbar-nav { background: #fff; padding: 15px; border-radius: 10px; margin-top: 10px; }
            .top-contact-bar { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="top-contact-bar py-2 border-bottom d-none d-md-block" style="background: #f8f9fa;">
        <div class="container d-flex justify-content-between align-items-center small">
            <div>
                <i class="fa-solid fa-phone-volume text-warning me-2"></i> الخط الساخن: <strong>16194</strong>
                <i class="fa-brands fa-whatsapp text-success mx-3"></i> واتساب: <strong>01023456789</strong>
            </div>
            <div><i class="fa-solid fa-location-dot text-danger me-2"></i> الغربية - زفتى</div>
        </div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('index') }}">
                <span class="tasty-logo-icon">T</span>
                <span>تـيـسـتـي</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNavbar">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="{{ url_for('index') }}"><i class="fa-solid fa-house mx-1"></i> الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="#menu-grid"><i class="fa-solid fa-utensils mx-1"></i> المنيو</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" data-bs-toggle="modal" data-bs-target="#aboutModal">من نحن</a></li>
                </ul>
                <button class="btn btn-cart-floating" data-bs-toggle="modal" data-bs-target="#cartModal">
                    <i class="fa-solid fa-basket-shopping"></i> السلة (<span id="cart-count-badge">0</span>)
                </button>
            </div>
        </div>
    </nav>

    <main class="main-content-wrapper">
        {% block content %}{% endblock %}
    </main>

    <div class="modal fade" id="aboutModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content p-4 text-center"><h5>مطعم تيستي زفتى</h5><p>الأصل في الجودة والسرعة.</p></div></div></div>
    
    <footer class="bg-dark text-white py-4 mt-5">
        <div class="container text-center">
            <p>&copy; 2026 منظومة مطعم تيستي زفتى الرقمية.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/cart.js') }}"></script>
</body>
</html>
